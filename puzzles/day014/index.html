<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inbox Puzzles – Trial Day 1</title>

<!-- Shared site shell -->
<link rel="stylesheet" href="/backup/common/site-shell.css">

<style>
  :root{
    --teal:#008080;
    --gold:#d8c178;
    --ink:#222;
    --line:#d5d5d5;
    --shadow:0 2px 10px rgba(0,0,0,.08);
  }

  body{
    margin:0;
    font-family:Arial,sans-serif;
    color:var(--ink);
  }

  .page-title{
    background:var(--teal);
    color:#fff;
    text-align:center;
    padding:18px 10px;
    font-size:clamp(26px,5vw,42px);
    font-weight:700;
  }

  .page-subtitle{
    text-align:center;
    font-size:14px;
    color:#666;
    margin:10px 0 20px;
  }

  .container{
    max-width:720px;
    margin:auto;
    padding:0 12px 30px;
  }

  .grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:16px;
  }

  .card{
    text-align:center;
    text-decoration:none;
    color:var(--teal);
  }

  .card-title{
    font-size:18px;
    font-weight:700;
    margin-bottom:8px;
  }

  .card img{
    width:100%;
    height:auto;
    border:2px solid var(--gold);
    border-radius:16px;
    box-shadow:var(--shadow);
    display:block;
  }

  @media (max-width:600px){
    .grid{
      grid-template-columns:1fr;
    }
  }
</style>
</head>

<body>
<div class="site-shell">

  <!-- Header -->
  <div id="site-header"></div>

  <div class="page-title">Day 14</div>
  <div class="page-subtitle">Your puzzles are ready below</div>

  <div class="container">
    <div class="grid">

      <a class="card" href="https://chrisabbe.github.io/crossword/puzzles/day014/index.html">
        <div class="card-title">Crossword</div>
        <img src="https://chrisabbe.github.io/Solutions/assets/puzzle-icons/crossword.png" alt="Crossword">
      </a>

      <a class="card" href="https://chrisabbe.github.io/word-search/puzzles/day014/index.html">
        <div class="card-title">Word Search</div>
        <img src="https://chrisabbe.github.io/Solutions/assets/puzzle-icons/wordsearch.png" alt="Word Search">
      </a>

      <a class="card" href="https://chrisabbe.github.io/Sudoku/puzzles/day014/index.html">
        <div class="card-title">Sudoku</div>
        <img src="https://chrisabbe.github.io/Solutions/assets/puzzle-icons/sudoku.png" alt="Sudoku">
      </a>

      <a class="card" href="https://chrisabbe.github.io/Cryptojoke/puzzles/day014/index.html">
        <div class="card-title">Cryptojoke</div>
        <img src="https://chrisabbe.github.io/Solutions/assets/puzzle-icons/cryptojoke.png" alt="Cryptojoke">
      </a>

    </div>
  </div>

  <!-- Footer -->
  <div id="site-footer"></div>

</div>

<script>
  function loadPartial(targetId, url) {
    fetch(url)
      .then(res => {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.text();
      })
      .then(html => {
        const el = document.getElementById(targetId);
        if (el) el.innerHTML = html;
      })
      .catch(err => console.error('Failed to load partial:', url, err));
  }

  loadPartial('site-header', '/backup/common/header.html');
  loadPartial('site-footer', '/backup/common/footer.html');
</script>

</body>
</html>
