<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inbox Puzzles – Trial Archive Day 7</title>

  <link rel="stylesheet" href="/backup/common/site-shell.css" />

  <style>
    :root{
      --teal:#008080;
      --gold:#d8c178;
      --ink:#222;
      --shadow:0 2px 10px rgba(0,0,0,.08);
    }

    body{
      margin:0;
      font-family:Arial,sans-serif;
      color:var(--ink);
    }

    .page-title{
      background:var(--teal);
      color:#fff;
      text-align:center;
      padding:18px 10px;
      font-size:clamp(28px,5vw,44px);
      font-weight:700;
    }

    .page-subtitle{
      text-align:center;
      color:#555;
      font-style:italic;
      font-size:clamp(15px,2.3vw,22px);
      margin:14px auto 22px;
      padding:0 12px;
    }

    .container{
      max-width:950px;
      margin:0 auto;
      padding:0 12px 32px;
    }

    .archive-list{
      display:grid;
      gap:16px;
    }

    .archive-card{
      background:#fff;
      border:2px solid var(--gold);
      border-radius:18px;
      padding:16px;
      box-shadow:var(--shadow);
    }

    .archive-title{
      text-align:center;
      color:var(--teal);
      font-size:22px;
      font-weight:700;
      margin-bottom:14px;
    }

    .archive-links{
      display:flex;
      gap:12px;
      justify-content:center;
      flex-wrap:wrap;
    }

    .archive-btn{
      display:inline-block;
      text-decoration:none;
      font-weight:700;
      font-size:15px;
      padding:12px 18px;
      border-radius:10px;
      border:2px solid var(--teal);
      color:var(--teal);
      background:#fff;
      min-width:160px;
      text-align:center;
    }

    .archive-btn:active{
      transform:translateY(1px);
    }

    .archive-btn.secondary{
      border-color:var(--gold);
      color:#8a6d1d;
    }
  </style>
</head>
<body>
  <div class="site-shell">

    <div id="site-header"></div>

    <div class="page-title">Trial Archive</div>
    <div class="page-subtitle">Your available trial puzzle days are listed below.</div>

    <div class="container">
      <div class="archive-list">

        <section class="archive-card">
          <div class="archive-title">Day 1</div>
          <div class="archive-links">
            <a class="archive-btn" href="/backup/trial/trial-day01/">▶ Play Puzzles</a>
            <a class="archive-btn secondary" href="/Solutions/trial/trial-day02/">✔ View Solutions</a>
          </div>
        </section>

        <section class="archive-card">
          <div class="archive-title">Day 2</div>
          <div class="archive-links">
            <a class="archive-btn" href="/backup/trial/trial-day02/">▶ Play Puzzles</a>
            <a class="archive-btn secondary" href="/Solutions/trial/trial-day03/">✔ View Solutions</a>
          </div>
        </section>

        <section class="archive-card">
          <div class="archive-title">Day 3</div>
          <div class="archive-links">
            <a class="archive-btn" href="/backup/trial/trial-day03/">▶ Play Puzzles</a>
            <a class="archive-btn secondary" href="/Solutions/trial/trial-day04/">✔ View Solutions</a>
          </div>
        </section>

        <section class="archive-card">
          <div class="archive-title">Day 4</div>
          <div class="archive-links">
            <a class="archive-btn" href="/backup/trial/trial-day04/">▶ Play Puzzles</a>
            <a class="archive-btn secondary" href="/Solutions/trial/trial-day05/">✔ View Solutions</a>
          </div>
        </section>

        <section class="archive-card">
          <div class="archive-title">Day 5</div>
          <div class="archive-links">
            <a class="archive-btn" href="/backup/trial/trial-day05/">▶ Play Puzzles</a>
            <a class="archive-btn secondary" href="/Solutions/trial/trial-day06/">✔ View Solutions</a>
          </div>
        </section>

        <section class="archive-card">
          <div class="archive-title">Day 6</div>
          <div class="archive-links">
            <a class="archive-btn" href="/backup/trial/trial-day06/">▶ Play Puzzles</a>
            <a class="archive-btn secondary" href="/Solutions/trial/trial-day07/">✔ View Solutions</a>
          </div>
        </section>

      </div>
    </div>

    <div id="site-footer"></div>

  </div>

  <script>
    function loadPartial(targetId, url) {
      fetch(url)
        .then(res => {
          if (!res.ok) throw new Error('HTTP ' + res.status);
          return res.text();
        })
        .then(html => {
          const el = document.getElementById(targetId);
          if (el) el.innerHTML = html;
        })
        .catch(err => console.error('Failed to load partial:', url, err));
    }

    loadPartial('site-header', '/backup/common/header.html');
    loadPartial('site-footer', '/backup/common/footer.html');
  </script>
</body>
</html>
