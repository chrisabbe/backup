<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inbox Puzzles – Trial Archive Day 1</title>

  <link rel="stylesheet" href="/backup/common/site-shell.css" />

  <style>
    :root{
      --teal:#008080;
      --gold:#d8c178;
      --ink:#222;
      --line:#d5d5d5;
      --shadow:0 2px 10px rgba(0,0,0,.08);
    }

    body{
      margin:0;
      font-family:Arial,sans-serif;
      color:var(--ink);
    }

    .page-title{
      background:var(--teal);
      color:#fff;
      text-align:center;
      padding:18px 10px;
      font-size:clamp(28px,5vw,44px);
      font-weight:700;
    }

    .page-subtitle{
      text-align:center;
      color:#555;
      font-style:italic;
      font-size:clamp(15px,2.3vw,22px);
      margin:14px auto 22px;
      padding:0 12px;
    }

    .container{
      max-width:950px;
      margin:0 auto;
      padding:0 12px 32px;
    }

    .archive-list{
      display:grid;
      gap:16px;
    }

    .archive-card{
      background:#fff;
      border:2px solid var(--gold);
      border-radius:18px;
      padding:16px;
      box-shadow:var(--shadow);
    }

    .archive-title{
      text-align:center;
      color:var(--teal);
      font-size:22px;
      font-weight:700;
      margin-bottom:14px;
    }

    .archive-links{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    .archive-link{
      display:block;
      text-decoration:none;
      color:var(--teal);
      text-align:center;
      font-weight:700;
    }

    .archive-link img{
      width:100%;
      height:auto;
      display:block;
      border:2px solid var(--gold);
      border-radius:16px;
      box-shadow:var(--shadow);
      background:#fff;
    }

    .archive-link span{
      display:block;
      margin-top:8px;
      font-size:17px;
    }

    @media (max-width:700px){
      .archive-links{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <div class="site-shell">

    <div id="site-header"></div>

    <div class="page-title">Trial Puzzle Archive</div>
    <div class="page-subtitle">Your available trial puzzle days are listed below.</div>

    <div class="container">
      <div class="archive-list">

        <!-- TRIAL DAY 1 -->
        <section class="archive-card">
          <div class="archive-title">Trial Day 1</div>
          <div class="archive-links">

            <a class="archive-link" href="/backup/trial/trial-day01/">
              <img src="https://chrisabbe.github.io/Solutions/assets/puzzle-icons/crossword.png" alt="Trial Day 1 puzzle backup page">
              <span>Open Puzzle Backup Page</span>
            </a>

            <a class="archive-link" href="/Solutions/trial/trial-day02/">
              <img src="https://chrisabbe.github.io/Solutions/assets/puzzle-icons/cryptojoke.png" alt="Trial Day 1 solutions page">
              <span>Open Solutions Page</span>
            </a>

          </div>
        </section>

      </div>
    </div>

    <div id="site-footer"></div>

  </div>

  <script>
    function loadPartial(targetId, url) {
      fetch(url)
        .then(res => {
          if (!res.ok) throw new Error('HTTP ' + res.status);
          return res.text();
        })
        .then(html => {
          const el = document.getElementById(targetId);
          if (el) el.innerHTML = html;
        })
        .catch(err => console.error('Failed to load partial:', url, err));
    }

    loadPartial('site-header', '/backup/common/header.html');
    loadPartial('site-footer', '/backup/common/footer.html');
  </script>
</body>
</html>
